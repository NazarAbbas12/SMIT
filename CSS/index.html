<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <div class="main">

        <div class="cover">
                 <div class="container">
                    <div class="top">
                            <div class="sign-in">
                                <img src="./image/google-logo-icon-illustration-free-vector.webp" alt="google logo">
                                <h2>Sign in</h2>
                                <span>Use your Google Account</span>
                            </div>
                            <div class="email">
                                <input type="text" placeholder="email or phone">
                                <a href="">Forgot email?</a>
                                <span>Not your computer? Use Guest mode to sign in privately.
                                    </span>
                                <a href="">Learn more about using Guest mode</a>
                            </div>
                    </div>
        
                 </div>

                <div class="bottom-btn">
                        <a href="">Create account</a>
                        <button>Next</button>
                </div>

                <div class="google-links">

                    <div class="language">
                        English (United States)
                    </div>

                    <div class="footer-links">
                        <a href="#">Help</a>
                        <a href="#">Privacy</a>
                        <a href="#">Terms</a>
                    </div>

                 </div>
        </div>    
    </div>
    
</body>
</html>
